# claude-agent-sandbox Agent Configuration
#
# This defines the agent team structure.
# Each agent has specific responsibilities and scope.

module: claude-agent-sandbox
description: Agent team for claude-agent-sandbox

# Directory scopes — adjust paths for your project
scopes:
  root: ./
  frontend: src/ui/
  backend:
    app: src/
    domain: src/domain/
  acceptance:
    domain: test/acceptance/
  # Add more scopes as needed

# Agent definitions
agents:

  # === Working Agents ===

  backend-agent:
    description: Backend specialist
    responsibilities:
      - Implement domain logic in interactors
      - Define Causes and Effects for event sourcing
      - Update Entities and Value Objects
      - Implement API endpoints
    scope:
      - src/domain/**
      - src/interactors/**
      - src/api/**
      - src/infrastructure/**
    guidelines:
      - Follow Clean Architecture patterns from copilot-instructions.md
      - Entities are immutable with fluent builders
      - No framework dependencies in domain layer
      - Use ubiquitous language from glossary.md
    validator: backend-validator

  frontend-agent:
    description: Frontend specialist
    responsibilities:
      - Implement UI components
      - Update templates and styles
      - Integrate with backend APIs
      - Handle i18n translations
    scope:
      - src/ui/**
    guidelines:
      - Accessibility (keyboard nav, aria labels, focus management)
      - No hardcoded strings — use i18n
      - Follow component architecture conventions
    validator: frontend-validator

  acceptance-agent:
    description: BDD acceptance test specialist
    responsibilities:
      - Maintain DSL layer
      - Implement protocol drivers (Domain, Controller, UI)
      - Write intent-focused acceptance tests
      - Ensure test variants work across all layers
    scope:
      - test/acceptance/**
    guidelines:
      - Tests express intent, not mechanics
      - DSL is domain language, stable and reusable
      - Protocol drivers handle IO/protocol boundaries
      - Use stable selectors (data-testid) for UI
      - No sleeps — use explicit waits
    validator: dsl-validator

  # === Validator Agents (Wingmen) ===

  backend-validator:
    description: Validates backend changes against Clean Architecture and repo guidelines
    checks:
      - Clean Architecture compliance (entities, value objects, interactors)
      - No framework leakage into domain
      - Immutability of domain objects
      - Proper Cause/Effect design
      - Ubiquitous language usage
      - Security considerations
    triggers:
      - After backend-agent completes a task
      - On PR review request

  frontend-validator:
    description: Validates frontend changes for quality and accessibility
    checks:
      - Linting passes
      - Accessibility (a11y) compliance
      - i18n — no hardcoded user-facing strings
      - Component architecture
      - Responsive design considerations
    triggers:
      - After frontend-agent completes a task
      - On PR review request

  dsl-validator:
    description: Validates acceptance tests and DSL for BDD compliance
    checks:
      - Tests are intent-focused
      - No UI internals leak into DSL
      - No implementation details in tests
      - Stable, non-flaky patterns
      - All test layers pass (domain, controller, UI)
    triggers:
      - After acceptance-agent completes a task
      - Before marking task complete

  # === Coordinator ===

  module-coordinator:
    description: Coordinates work between agents
    responsibilities:
      - Decompose goals into agent tasks
      - Synchronize API contracts between frontend/backend
      - Resolve conflicts between agents
      - Track overall progress
      - Determine when to run validators
    workflow:
      1: Parse goal and identify acceptance tests
      2: Analyze DSL methods needed
      3: Decompose into backend/frontend/acceptance tasks
      4: Dispatch to agents (can be parallel)
      5: Monitor progress and resolve blockers
      6: Trigger validators
      7: Run acceptance tests
      8: Mark complete or iterate

# Workflow templates
workflows:
  acceptance-goal:
    description: Make acceptance test(s) pass
    steps:
      - name: analyze
        agent: module-coordinator
        action: Parse goal, identify tests, decompose tasks

      - name: backend
        agent: backend-agent
        parallel: true
        action: Implement backend changes

      - name: frontend
        agent: frontend-agent
        parallel: true
        action: Implement frontend changes

      - name: acceptance
        agent: acceptance-agent
        action: Update drivers and tests

      - name: validate
        agents: [backend-validator, frontend-validator, dsl-validator]
        action: Run all validations

      - name: test
        agent: module-coordinator
        action: Run acceptance tests, iterate if needed

      - name: complete
        agent: module-coordinator
        action: Prepare commit, update plan
