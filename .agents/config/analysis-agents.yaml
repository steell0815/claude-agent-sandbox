# Blueprint Analysis Agent Configuration
#
# This defines the agent team for analyzing external repositories
# and suggesting blueprint improvements. Each agent has specific
# analysis responsibilities and file scope within the target repo.

module: blueprint-analysis
description: Agent team for analyzing repositories and evolving the blueprint

# Agent definitions
agents:

  # === Coordinator ===

  analysis-coordinator:
    description: Orchestrates the full analysis pipeline
    responsibilities:
      - Validate target repo and detect tech stack
      - Load blueprint baseline (ADRs, guardrails, patterns)
      - Dispatch specialist analysts in parallel
      - Collect, deduplicate, and rank findings
      - Filter findings by scoring (novelty, generality, evidence, alignment)
      - Dispatch blueprint-writer for each accepted finding
      - Produce summary report
    workflow: analyze-repo

  # === Specialist Analysts (read target repo, compare to blueprint) ===

  adr-analyst:
    description: Discovers architectural decisions in the target repo
    responsibilities:
      - Scan for ADR directories and architectural decision docs
      - Extract decisions, rationale, and consequences
      - Compare against blueprint's existing ADRs
      - Identify novel architectural decisions not yet captured
      - Detect decision patterns (technology choices, structural patterns, trade-offs)
    scope:
      - docs/
      - adr/
      - decisions/
      - ARCHITECTURE.md
      - README.md
      - doc/
      - documentation/

  practice-analyst:
    description: Discovers guardrails, architectural patterns, and workflow practices
    responsibilities:
      - Analyze guardrails (explicit rules, linter configs, ArchUnit/dependency-cruiser, pre-commit hooks)
      - Analyze architectural patterns (layer separation, domain modeling, port/adapter structure)
      - Analyze development workflow (CONTRIBUTING.md, commit conventions, PR templates, AI configs)
      - Detect enforced constraints (build plugins, static analysis rules, custom lint rules)
      - Identify code review automation and quality gate configurations
    scope:
      - src/
      - lib/
      - .eslintrc*
      - .eslintrc.json
      - .eslintrc.yml
      - checkstyle*.xml
      - .husky/
      - .pre-commit-config.yaml
      - CONTRIBUTING.md
      - CLAUDE.md
      - .github/PULL_REQUEST_TEMPLATE*
      - .editorconfig
      - biome.json
      - deno.json

  test-analyst:
    description: Discovers testing patterns and quality measurement approaches
    responsibilities:
      - Analyze testing patterns (BDD, acceptance structure, driver variants)
      - Analyze coverage and mutation testing config and thresholds
      - Detect novel testing approaches (contract, property-based, visual regression, snapshot)
      - Identify test organization strategies (by feature, by layer, by type)
      - Analyze test infrastructure (fixtures, factories, builders, test containers)
    scope:
      - test/
      - spec/
      - __tests__/
      - "*.test.*"
      - "*.spec.*"
      - "*.config.*"
      - pom.xml
      - build.gradle*
      - package.json
      - jest.config.*
      - vitest.config.*
      - playwright.config.*
      - cypress.config.*

  pipeline-analyst:
    description: Discovers CI/CD, security, and deployment practices
    responsibilities:
      - Analyze CI/CD configuration (stages, gates, tools, parallelism)
      - Analyze security scanning (SAST, DAST, SBOM, dependency scanning, secret detection)
      - Analyze deployment patterns (containers, IaC, GitOps, feature flags)
      - Detect quality gates and promotion criteria
      - Identify infrastructure-as-code patterns and environment management
    scope:
      - .github/workflows/
      - Jenkinsfile
      - .gitlab-ci.yml
      - .circleci/
      - Dockerfile
      - docker-compose*.yml
      - helm/
      - k8s/
      - terraform/
      - .terraform/
      - Makefile
      - Taskfile.yml

  # === Writer (writes to blueprint repo) ===

  blueprint-writer:
    description: Creates blueprint changes and PRs for accepted findings
    responsibilities:
      - Create one branch per finding
      - Make the blueprint change (new ADR, new guardrail, doc update, stack config)
      - Follow existing blueprint conventions (/add-adr pattern, /add-guardrail pattern)
      - Commit with conventional message including source and hypothesis
      - Create PR via gh with structured body (hypothesis, evidence, gap, category, confidence)
    scope:
      - core/
      - stacks/

# Workflow templates
workflows:
  analyze-repo:
    description: Analyze a repository for blueprint evolution suggestions
    steps:
      - name: validate
        agent: analysis-coordinator
        action: Validate target repo, detect stack, load blueprint baseline

      - name: analyze
        agents: [adr-analyst, practice-analyst, test-analyst, pipeline-analyst]
        parallel: true
        action: Scan target repo, compare to blueprint, produce findings

      - name: rank
        agent: analysis-coordinator
        action: Score, deduplicate, and filter findings

      - name: write
        agent: blueprint-writer
        action: Create branch, commit change, open PR for each accepted finding

      - name: report
        agent: analysis-coordinator
        action: Produce summary report with PR links and excluded findings
