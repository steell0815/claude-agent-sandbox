# Services in this stack:
#   proxy-init  one-shot — generates the mitmproxy CA into the ./ca volume.
#   proxy       mitmdump with policy.py — sole bridge to the internet.
#   keys-init   one-shot — generates the agent<->builder ed25519 keypair.
#   builder     long-running JDK 25 + Maven + Node sshd, sibling of the agent.
#   agent       Claude Code, attached only to the internal network.
#
# Hardening rings (defense in depth):
#   harness    settings.json + validate-bash hook (mounted profile)
#   container  cap_drop ALL, no-new-privs, read-only rootfs, non-root
#   network    proxy-only egress, host allowlist, body-side DLP

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  proxy-init:
    build:
      context: ./proxy
    volumes:
      - ./ca:/home/mitmproxy/.mitmproxy
    entrypoint: ["/usr/local/bin/bootstrap-ca.sh"]
    network_mode: none
    restart: "no"
    logging: *default-logging

  proxy:
    build:
      context: ./proxy
    depends_on:
      proxy-init:
        condition: service_completed_successfully
    volumes:
      # Read-only mount: the agent must never see the CA private key.
      - ./ca:/home/mitmproxy/.mitmproxy:ro
      - logs:/var/log/proxy
    networks:
      - internal
      - egress
    environment:
      ALLOWLIST_EXTRA: ${ALLOWLIST_EXTRA:-}
      DLP_EXTRA: ${DLP_EXTRA:-}
      AUDIT_LOG_PATH: /var/log/proxy/audit.jsonl
      AUDIT_MAX_BYTES: ${AUDIT_MAX_BYTES:-52428800}
      AUDIT_BACKUPS: ${AUDIT_BACKUPS:-10}
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  keys-init:
    build:
      context: ./keys-init
    volumes:
      - builder-keys:/keys
    network_mode: none
    restart: "no"
    logging: *default-logging

  builder:
    build:
      context: .
      dockerfile: builder/Dockerfile
      args:
        CA_CERT_PATH: ca/mitmproxy-ca-cert.pem
    depends_on:
      proxy:
        condition: service_started
      keys-init:
        condition: service_completed_successfully
    volumes:
      - ${AGENT_WORKDIR:-./project}:/workspace:rw
      - builder-keys:/run/builder-keys:ro
      - builder-m2:/home/builder/.m2/repository
      - builder-gradle-cache:/home/builder/.gradle/caches
    networks:
      - internal
    user: "1001:1001"
    working_dir: /workspace
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      NO_PROXY: localhost,127.0.0.1,proxy
    mem_limit: ${BUILDER_MEM_LIMIT:-6g}
    cpus: ${BUILDER_CPUS:-4}
    restart: unless-stopped
    logging: *default-logging

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
      args:
        CA_CERT_PATH: ca/mitmproxy-ca-cert.pem
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    depends_on:
      proxy:
        condition: service_started
      keys-init:
        condition: service_completed_successfully
      builder:
        condition: service_started
    volumes:
      # Workdir bind-mount. Defaults to the bundled ./project/ scratch dir.
      # Override with AGENT_WORKDIR=/abs/path (or use scripts/run-agent.sh,
      # which sets it to $PWD by default).
      - ${AGENT_WORKDIR:-./project}:/workspace:rw
      - ${HOME}/.claude:/home/agent/.claude:ro
      - logs:/var/log/proxy:ro
      # Persists ~/.claude.json (symlinked in the image) across runs so
      # the agent doesn't re-prompt for theme / trusted-directory / etc.
      # on every container start. Scoped to this stack — wipe with
      # `docker volume rm claude-agent-sandbox_sandbox-state`.
      - sandbox-state:/home/agent/sandbox-state
      # Read-only access to the agent's SSH private key for talking to the
      # builder. Populated by the keys-init one-shot.
      - builder-keys:/run/builder-keys:ro
    networks:
      - internal
    user: "1000:1000"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # Scratch space for Claude Code + tools.
      - /tmp:size=512m,mode=1777
      # Writable Claude Code state — shadows the read-only profile mount.
      - /home/agent/.claude/sessions:size=64m,uid=1000,gid=1000
      - /home/agent/.claude/todos:size=8m,uid=1000,gid=1000
      - /home/agent/.claude/cache:size=128m,uid=1000,gid=1000
      - /home/agent/.claude/file-history:size=32m,uid=1000,gid=1000
      - /home/agent/.claude/projects:size=64m,uid=1000,gid=1000
      - /home/agent/.claude/session-env:size=8m,uid=1000,gid=1000
      # npm/pip/etc. caches.
      - /home/agent/.npm:size=64m,uid=1000,gid=1000
      - /home/agent/.cache:size=64m,uid=1000,gid=1000
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      NO_PROXY: localhost,127.0.0.1
    mem_limit: ${AGENT_MEM_LIMIT:-4g}
    cpus: ${AGENT_CPUS:-2}
    stdin_open: true
    tty: true
    logging: *default-logging

networks:
  internal:
    internal: true
  egress:
    driver: bridge

volumes:
  logs:
  sandbox-state:
  builder-keys:
  builder-m2:
  builder-gradle-cache:
