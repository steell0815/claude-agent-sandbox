# Services in this stack:
#   proxy-init  one-shot — generates the mitmproxy CA into the ./ca volume.
#   proxy       mitmdump with policy.py — sole bridge to the internet.
#   keys-init   one-shot — generates the agent<->builder ed25519 keypair.
#   builder     long-running JDK 25 + Maven + Node sshd, sibling of the agent.
#   agent       Claude Code, attached only to the internal network.
#
# Hardening rings (defense in depth):
#   harness    settings.json + validate-bash hook (mounted profile)
#   container  cap_drop ALL, no-new-privs, read-only rootfs, non-root
#   network    proxy-only egress, host allowlist, body-side DLP

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  proxy-init:
    build:
      context: ./proxy
    volumes:
      - ./ca:/home/mitmproxy/.mitmproxy
    entrypoint: ["/usr/local/bin/bootstrap-ca.sh"]
    network_mode: none
    restart: "no"
    logging: *default-logging

  proxy:
    build:
      context: ./proxy
    depends_on:
      proxy-init:
        condition: service_completed_successfully
    volumes:
      # Read-only mount: the agent must never see the CA private key.
      - ./ca:/home/mitmproxy/.mitmproxy:ro
      - logs:/var/log/proxy
    networks:
      - internal
      - egress
    environment:
      ALLOWLIST_EXTRA: ${ALLOWLIST_EXTRA:-}
      DLP_EXTRA: ${DLP_EXTRA:-}
      AUDIT_LOG_PATH: /var/log/proxy/audit.jsonl
      AUDIT_MAX_BYTES: ${AUDIT_MAX_BYTES:-52428800}
      AUDIT_BACKUPS: ${AUDIT_BACKUPS:-10}
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  keys-init:
    build:
      context: ./keys-init
    volumes:
      - builder-keys:/keys
    network_mode: none
    restart: "no"
    logging: *default-logging

  # Docker API choke point in front of the host daemon. Reachable from the
  # builder over the internal network at tcp://docker-proxy:2375.
  #
  # Allowlist below is what Testcontainers (incl. the Ryuk reaper) needs:
  # container CRUD, exec, image pulls, networks. SYSTEM/SWARM/SECRETS/etc.
  # stay denied. POST=1 enables write operations.
  #
  # RESIDUAL RISK: the tecnativa proxy does not filter request bodies, so
  # any client that can reach 2375 can ask the host daemon to create a
  # container with `HostConfig.Binds: ["/:/host"]`. In this sandbox that
  # client is the builder, and via `ssh builder docker ...` effectively
  # the LLM agent. Ryuk needs bind mounts to mount /var/run/docker.sock
  # into itself, so we can't disable Binds wholesale. Treat
  # docker-proxy:2375 as a privileged surface the agent can reach.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    networks:
      - internal
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      VERSION: 1
      EVENTS: 1
      EXEC: 1
      POST: 1
      # Explicitly keep the Swarm / Build / Auth / Secret surface off.
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging: *default-logging

  builder:
    build:
      context: .
      dockerfile: builder/Dockerfile
      args:
        CA_CERT_PATH: ca/mitmproxy-ca-cert.pem
    depends_on:
      proxy:
        condition: service_started
      keys-init:
        condition: service_completed_successfully
      docker-proxy:
        condition: service_started
    volumes:
      - ${AGENT_WORKDIR:-./project}:/workspace:rw
      - builder-keys:/run/builder-keys:ro
      - builder-m2:/home/builder/.m2/repository
      - builder-gradle-cache:/home/builder/.gradle/caches
    networks:
      - internal
    user: "1001:1001"
    working_dir: /workspace
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    # `host.docker.internal` is auto-resolved on Docker Desktop only for
    # containers on the default bridge. User-defined networks (and
    # especially `internal: true` ones) need an explicit hosts entry.
    # The `host-gateway` magic value is resolved by Docker to the host's
    # routable IP from this container's perspective. Testcontainers will
    # report spawned-container connection URLs using this hostname
    # (see TESTCONTAINERS_HOST_OVERRIDE below).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      NO_PROXY: localhost,127.0.0.1,proxy,docker-proxy
      # Testcontainers reads DOCKER_HOST and routes through the filtered
      # proxy instead of the host daemon directly. Image pulls happen
      # on the host daemon and therefore bypass mitmproxy egress filtering.
      DOCKER_HOST: tcp://docker-proxy:2375
      # Tell Testcontainers what hostname to report when handing test
      # code a connection URL for a spawned container. Without this, TC
      # uses the host from DOCKER_HOST (= `docker-proxy`), which doesn't
      # listen on the random published ports — only the real host does.
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      # Disable Testcontainers' Ryuk reaper. With DOCKER_HOST=tcp://… ,
      # modern Testcontainers no longer mounts the host socket into Ryuk;
      # it spawns Ryuk on the host's default bridge and passes the same
      # DOCKER_HOST env. Ryuk then can't resolve `docker-proxy` because
      # that name is a compose-internal DNS entry, not visible from the
      # default bridge. Disabling Ryuk avoids the network surgery (a
      # shared bridge attached to docker-proxy + a TC property to spawn
      # Ryuk on it) while staying safe enough for a dev sandbox:
      # Testcontainers spawns its containers with --rm, so they
      # auto-clean on normal JVM exit. The only leak path is a JVM
      # crash before --rm fires; `docker compose down` between sessions
      # sweeps anything stranded.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    mem_limit: ${BUILDER_MEM_LIMIT:-6g}
    cpus: ${BUILDER_CPUS:-4}
    restart: unless-stopped
    logging: *default-logging

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
      args:
        CA_CERT_PATH: ca/mitmproxy-ca-cert.pem
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    depends_on:
      proxy:
        condition: service_started
      keys-init:
        condition: service_completed_successfully
      builder:
        condition: service_started
    volumes:
      # Workdir bind-mount. Defaults to the bundled ./project/ scratch dir.
      # Override with AGENT_WORKDIR=/abs/path (or use scripts/run-agent.sh,
      # which sets it to $PWD by default).
      - ${AGENT_WORKDIR:-./project}:/workspace:rw
      - ${HOME}/.claude:/home/agent/.claude:ro
      - logs:/var/log/proxy:ro
      # Persists ~/.claude.json (symlinked in the image) across runs so
      # the agent doesn't re-prompt for theme / trusted-directory / etc.
      # on every container start. Scoped to this stack — wipe with
      # `docker volume rm claude-agent-sandbox_sandbox-state`.
      - sandbox-state:/home/agent/sandbox-state
      # Read-only access to the agent's SSH private key for talking to the
      # builder. Populated by the keys-init one-shot.
      - builder-keys:/run/builder-keys:ro
    networks:
      - internal
    user: "1000:1000"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # Scratch space for Claude Code + tools.
      - /tmp:size=512m,mode=1777
      # Writable Claude Code state — shadows the read-only profile mount.
      - /home/agent/.claude/sessions:size=64m,uid=1000,gid=1000
      - /home/agent/.claude/todos:size=8m,uid=1000,gid=1000
      - /home/agent/.claude/cache:size=128m,uid=1000,gid=1000
      - /home/agent/.claude/file-history:size=32m,uid=1000,gid=1000
      - /home/agent/.claude/projects:size=64m,uid=1000,gid=1000
      - /home/agent/.claude/session-env:size=8m,uid=1000,gid=1000
      # npm/pip/etc. caches.
      - /home/agent/.npm:size=64m,uid=1000,gid=1000
      - /home/agent/.cache:size=64m,uid=1000,gid=1000
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      NO_PROXY: localhost,127.0.0.1
    mem_limit: ${AGENT_MEM_LIMIT:-4g}
    cpus: ${AGENT_CPUS:-2}
    stdin_open: true
    tty: true
    logging: *default-logging

networks:
  internal:
    internal: true
  egress:
    driver: bridge

volumes:
  logs:
  sandbox-state:
  builder-keys:
  builder-m2:
  builder-gradle-cache:
