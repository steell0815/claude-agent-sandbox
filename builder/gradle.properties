# Sandbox builder Gradle proxy settings.
# Mirrors maven-settings.xml so Gradle resolves through mitmproxy too.

systemProp.http.proxyHost=proxy
systemProp.http.proxyPort=8080
systemProp.http.nonProxyHosts=localhost|127.0.0.1|proxy

systemProp.https.proxyHost=proxy
systemProp.https.proxyPort=8080
systemProp.https.nonProxyHosts=localhost|127.0.0.1|proxy
