name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  compose-config:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config -q
        # ANTHROPIC_API_KEY is unset in CI; the YAML uses ${VAR:-} fallbacks
        # so config interpolation never fails.
        run: docker compose config -q

  policy-tests:
    name: Policy unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          # mitmproxy pulls in everything policy.py needs at import time.
          # Pin the major to match the proxy image.
          pip install "mitmproxy~=11.0" pytest

      - name: Run policy tests
        run: pytest proxy/tests/ -v
