name: Git Repository Integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  git-fsck:
    name: Git Integrity Check (git fsck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run git fsck --full
        run: git fsck --full --no-dangling 2>&1
