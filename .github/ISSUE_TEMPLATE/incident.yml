name: Security Incident
description: Report and track a security incident through resolution
labels: ["type:incident", "status:open"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Incident Description
      description: What happened? When was it detected?
    validations:
      required: true
  - type: input
    id: alert-source
    attributes:
      label: Alert Source
      description: "How was this detected? (e.g., DAST scan, monitoring alert, user report)"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: "Confidentiality, Integrity, Availability impact"
    validations:
      required: true
  - type: textarea
    id: immediate-actions
    attributes:
      label: Immediate Actions Taken
    validations:
      required: false
  - type: checkboxes
    id: closure
    attributes:
      label: Closure Checklist
      options:
        - label: Root cause identified
        - label: Fix deployed
        - label: Monitoring confirms resolution
        - label: Lessons learned recorded
